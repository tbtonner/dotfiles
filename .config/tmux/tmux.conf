set-option -g default-shell /opt/homebrew/bin/fish

set -g mouse on
setw -g mode-keys vi
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind-key e copy-mode

set-option -g status on
set-option -g status-keys vi
set-option -g status-justify absolute-centre
set-option -g status-left "#[fg=#957FB8]tbtonner #(tmux display-message -p '#{session_id}' | tr -d '$')#[default]"
set-option -g status-right "#[fg=#DCD7BA]%H:%M #[fg=#7E9CD8,bg=default]%Y/%m/%d"
set-window-option -g window-status-format "#[fg=#DCD7BA]#W"
set-window-option -g window-status-current-format "#[fg=#DCD7BA]#W"

set -g status-style bg=default
set-option -g status-position top

set -g pane-active-border-style bg=default,fg=#e4c284

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# navigation of splits
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# vim copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# pipe into nvim (popup)
bind-key a run-shell "tmux capture-pane -peS -32768 | awk 'BEGIN{esc=sprintf(\"\\033\")} {s=$0; gsub(esc \"\\[[0-9;]*[a-zA-Z]\", \"\", s); if (s ~ /[^[:space:]]/) last=NR; line[NR]=$0} END{for(i=1;i<=last;i++) print line[i]}' > /tmp/tmux-capture.txt" \; display-popup -E -b rounded -S fg=#DCD7BA -w 90% -h 90% "nvim -c 'setlocal buftype=nofile bufhidden=wipe noswapfile conceallevel=3' -c 'lua require(\"baleia\").setup({}).once(0)' -c 'normal! G' /tmp/tmux-capture.txt"
# pipe into nvim (new window)
bind-key A run-shell "tmux capture-pane -peS -32768 | awk 'BEGIN{esc=sprintf(\"\\033\")} {s=$0; gsub(esc \"\\[[0-9;]*[a-zA-Z]\", \"\", s); if (s ~ /[^[:space:]]/) last=NR; line[NR]=$0} END{for(i=1;i<=last;i++) print line[i]}' > /tmp/tmux-capture.txt" \; new-window -n "capture" "nvim -c 'setlocal buftype=nofile bufhidden=wipe noswapfile conceallevel=3' -c 'lua require(\"baleia\").setup({}).once(0)' -c 'normal! G' /tmp/tmux-capture.txt"

# Split panes 
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind-key d kill-pane

# Window
bind c new-window -c "#{pane_current_path}"
bind-key l next-window
bind-key h previous-window

# Sessions
bind % ls
bind-key k confirm-before -p "Kill session #{session_name}? (y/n)" "run-shell 'tmux switch-client -n; tmux kill-session -t #{session_name}'"
bind-key N new-session
bind-key [ switch-client -p
bind-key ] switch-client -n

# Prompted join-pane
bind-key j command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'
