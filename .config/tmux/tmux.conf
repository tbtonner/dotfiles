set-option -g default-shell /opt/homebrew/bin/fish

set -g mouse on
setw -g mode-keys vi
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
set -g focus-events on
set -g history-limit 50000
set -g set-clipboard on
set -g renumber-windows on
set -g detach-on-destroy no-detached

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind-key e copy-mode

set-option -g status on
set-option -g status-keys vi
set-option -g status-justify absolute-centre
set-option -g status-left-length 40
set-option -g status-left "#[fg=#957FB8]#S#[default]"
set-option -g status-right "#[fg=#DCD7BA]%H:%M #[fg=#7E9CD8,bg=default]%Y/%m/%d"
set-window-option -g window-status-format "#[fg=#DCD7BA]#W"
set-window-option -g window-status-current-format "#[fg=#E6C384]#W"

set -g status-style bg=default
set-option -g status-position top

set -g pane-active-border-style bg=default,fg=#e4c284

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

# navigation of splits
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# vim copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Copy mode pipe into nvim
bind-key a run-shell '~/.config/tmux/capture-to-nvim.sh popup'
bind-key A run-shell '~/.config/tmux/capture-to-nvim.sh window'

# Split panes
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Kill
bind-key d kill-pane
bind-key x kill-window

# Window
bind c new-window -c "#{pane_current_path}"
bind-key l next-window
bind-key h previous-window

# Sessions
bind-key [ switch-client -p
bind-key ] switch-client -n
bind-key S new-session -c "#{pane_current_path}"
bind-key . command-prompt -I "#S" "rename-session '%%'"

# fzf popups
bind-key f display-popup -E -w 90% -h 90% '~/.config/tmux/session-picker.sh'
bind-key w display-popup -E -w 90% -h 90% '~/.config/tmux/window-picker.sh'
bind-key K display-popup -E -w 90% -h 90% '~/.config/tmux/kill-session.sh'
bind-key H display-popup -E -b rounded -S fg=#DCD7BA -w 90% -h 90% "nvim -R -c 'setlocal nomodifiable' ~/.config/tmux/help.md"
